<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBUFO - 荒诞超现实生物飞行体引擎 v4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050508;
            color: white;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
            color: #00ff00; font-size: 14px; line-height: 1.5; z-index: 10;
        }
        .warning { color: #ff3333; text-shadow: 0 0 8px rgba(255, 50, 50, 0.8); font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="fps">FPS: --</div>
        <div id="status">SYS_STATUS: OPTICAL_SENSORS_ONLINE</div>
        <div id="velocity">TARGET_SPEED: MACH 0.00</div>
        <div id="gforce">DYNAMIC_G: 1.00 G</div>
        <div id="bp" class="warning">WARNING: VASCULAR PRESSURE CRITICAL</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let lastTime = 0, frames = 0, currentFps = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ========================================================
        // 1. 高性能粒子雪碧图集与对象池系统
        // ========================================================
        const ParticleAtlas = { canvas: document.createElement('canvas'), rects: {} };
        function initParticleAtlas() {
            const actx = ParticleAtlas.canvas.getContext('2d');
            ParticleAtlas.canvas.width = 512; ParticleAtlas.canvas.height = 256;
            
            let flameGrad = actx.createRadialGradient(64, 64, 0, 64, 64, 64);
            flameGrad.addColorStop(0, 'rgba(255, 235, 150, 1)');
            flameGrad.addColorStop(0.2, 'rgba(255, 110, 0, 0.8)');
            flameGrad.addColorStop(0.6, 'rgba(210, 30, 0, 0.2)');
            flameGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            actx.fillStyle = flameGrad; actx.fillRect(0, 0, 128, 128);
            ParticleAtlas.rects['flame'] = { x: 0, y: 0, w: 128, h: 128 };
            
            let smokeGrad = actx.createRadialGradient(192, 64, 0, 192, 64, 64);
            smokeGrad.addColorStop(0, 'rgba(85, 80, 80, 0.35)');
            smokeGrad.addColorStop(0.5, 'rgba(45, 45, 48, 0.15)');
            smokeGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            actx.fillStyle = smokeGrad; actx.fillRect(128, 0, 128, 128);
            ParticleAtlas.rects['smoke'] = { x: 128, y: 0, w: 128, h: 128 };
        }
        initParticleAtlas();

        class BetterParticlePool {
            constructor(maxSize = 600) {
                this.pool = Array.from({ length: maxSize }, () => ({
                    x: 0, y: 0, vx: 0, vy: 0, size: 0, maxInitalSize: 0, alpha: 1, life: 0, maxLife: 0, active: false, type: 'smoke'
                }));
            }
            spawn(x, y, vx, vy, type, maxLife = 60) {
                const p = this.pool.find(item => !item.active);
                if (!p) return; 
                p.x = x; p.y = y; p.vx = vx; p.vy = vy; p.type = type; p.maxLife = maxLife; p.life = maxLife; p.alpha = 1; p.active = true;
                p.size = type === 'flame' ? Math.random() * 25 + 20 : Math.random() * 50 + 30;
                p.maxInitalSize = p.size;
            }
            updateAndDraw(ctx) {
                ctx.globalCompositeOperation = 'screen'; 
                for (let p of this.pool) {
                    if (!p.active) continue;
                    p.x += p.vx; p.y += p.vy; p.life--;
                    const lifeRatio = p.life / p.maxLife; p.alpha = lifeRatio;
                    p.size = p.type === 'smoke' ? p.maxInitalSize * (1 + (1 - lifeRatio) * 1.8) : p.maxInitalSize * (lifeRatio * 1.1);
                    if (p.life <= 0) { p.active = false; continue; }
                    
                    const rect = ParticleAtlas.rects[p.type];
                    ctx.save();
                    ctx.globalAlpha = p.type === 'smoke' ? p.alpha * 0.4 : p.alpha;
                    ctx.translate(p.x, p.y);
                    ctx.drawImage(ParticleAtlas.canvas, rect.x, rect.y, rect.w, rect.h, -p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
                ctx.globalCompositeOperation = 'source-over';
            }
        }
        const particles = new BetterParticlePool(600);

        // ========================================================
        // 2. 离屏渲染架构 (基础肉体层 + 新增高光反射层)
        // ========================================================
        const BODY_WIDTH = 250;
        const BODY_HEIGHT = 450;
        
        // 核心躯干
        const offscreenBody = document.createElement('canvas');
        const obCtx = offscreenBody.getContext('2d');
        offscreenBody.width = BODY_WIDTH; offscreenBody.height = BODY_HEIGHT;

        // 【新增】高光与湿润焦散层
        const offscreenSpecular = document.createElement('canvas');
        const osCtx = offscreenSpecular.getContext('2d');
        offscreenSpecular.width = BODY_WIDTH; offscreenSpecular.height = BODY_HEIGHT;

        // 提取轮廓绘制逻辑，确保高光和纹理严格贴合边界
        function drawBodyPath(context) {
            context.beginPath();
            context.arc(-35, 110, 42, 0, Math.PI * 2);
            context.arc(35, 110, 42, 0, Math.PI * 2);
            context.ellipse(0, 0, 42, 125, 0, 0, Math.PI * 2);
            context.ellipse(0, -135, 46, 36, 0, 0, Math.PI * 2);
        }

        function drawVein(ctx, startX, startY, controlPoints, width, color, blur) {
            ctx.beginPath(); ctx.moveTo(startX, startY);
            ctx.lineWidth = width; ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = blur;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            for (let i = 0; i < controlPoints.length; i += 3) {
                if (controlPoints[i+2]) ctx.bezierCurveTo(controlPoints[i].x, controlPoints[i].y, controlPoints[i+1].x, controlPoints[i+1].y, controlPoints[i+2].x, controlPoints[i+2].y);
            }
            ctx.stroke(); ctx.shadowBlur = 0; 
        }

        function preRenderOrganicAssets() {
            // ----------------------------------------------------
            // 资产 A: 基础有机结构与血管网
            // ----------------------------------------------------
            obCtx.clearRect(0, 0, BODY_WIDTH, BODY_HEIGHT);
            obCtx.save();
            obCtx.translate(BODY_WIDTH / 2, BODY_HEIGHT / 2);

            const noiseCanvas = document.createElement('canvas');
            noiseCanvas.width = 64; noiseCanvas.height = 64;
            const nCtx = noiseCanvas.getContext('2d');
            const imgData = nCtx.createImageData(64, 64);
            for(let i=0; i<imgData.data.length; i+=4) {
                const val = Math.random() * 255;
                imgData.data[i] = val; imgData.data[i+1] = val*0.62; imgData.data[i+2] = val*0.55; imgData.data[i+3] = 14;
            }
            nCtx.putImageData(imgData, 0, 0);
            const skinPattern = obCtx.createPattern(noiseCanvas, 'repeat');

            // 绘制基础 Sfumato 阴影
            let testicleGrad = obCtx.createRadialGradient(-35, 105, 5, -35, 110, 45);
            testicleGrad.addColorStop(0, '#ebbaa9'); testicleGrad.addColorStop(0.6, '#b87c6c'); testicleGrad.addColorStop(1, '#421d17');
            obCtx.fillStyle = testicleGrad; obCtx.beginPath(); obCtx.arc(-35, 110, 42, 0, Math.PI * 2); obCtx.fill();
            
            let testicleGradR = obCtx.createRadialGradient(35, 105, 5, 35, 110, 45);
            testicleGradR.addColorStop(0, '#ebbaa9'); testicleGradR.addColorStop(0.6, '#b87c6c'); testicleGradR.addColorStop(1, '#421d17');
            obCtx.fillStyle = testicleGradR; obCtx.beginPath(); obCtx.arc(35, 110, 42, 0, Math.PI * 2); obCtx.fill();

            let shaftGrad = obCtx.createLinearGradient(-45, 0, 45, 0);
            shaftGrad.addColorStop(0, '#542a20'); shaftGrad.addColorStop(0.18, '#c78a78');
            shaftGrad.addColorStop(0.5, '#f5ccbe'); shaftGrad.addColorStop(0.82, '#bd7e6d'); shaftGrad.addColorStop(1, '#401e17');
            obCtx.fillStyle = shaftGrad; obCtx.beginPath(); obCtx.ellipse(0, 0, 42, 125, 0, 0, Math.PI * 2); obCtx.fill();

            let glansGrad = obCtx.createRadialGradient(0, -145, 5, 0, -125, 50);
            glansGrad.addColorStop(0, '#ff8a8a'); glansGrad.addColorStop(0.4, '#d45555');
            glansGrad.addColorStop(0.8, '#7d2323'); glansGrad.addColorStop(1, '#3b0a0a');
            obCtx.fillStyle = glansGrad; obCtx.beginPath(); obCtx.ellipse(0, -135, 46, 36, 0, 0, Math.PI * 2); obCtx.fill();

            obCtx.save();
            obCtx.globalCompositeOperation = 'source-atop';
            // 深层静脉
            obCtx.globalAlpha = 0.4;
            drawVein(obCtx, -5, 120, [{x:-15, y:80}, {x:-25, y:20}, {x:-10, y:-40}, {x:5, y:-80}, {x:0, y:-110}, {x:-10, y:-125}], 6, '#3a2d59', 10);
            drawVein(obCtx, 15, 115, [{x:20, y:60}, {x:10, y:0}, {x:25, y:-50}, {x:10, y:-90}, {x:15, y:-115}, {x:5, y:-120}], 5, '#2c2242', 8);
            // 表层动脉
            obCtx.globalAlpha = 0.65;
            drawVein(obCtx, 0, 110, [{x:-5, y:70}, {x:-18, y:10}, {x:-2, y:-30}, {x:8, y:-60}, {x:-2, y:-90}, {x:-15, y:-120}], 2.5, '#5c1b1b', 2);
            drawVein(obCtx, -2, -30, [{x:-10, y:-20}, {x:-25, y:-40}, {x:-30, y:-60}], 1.5, '#4a1515', 1);
            drawVein(obCtx, 10, 100, [{x:12, y:80}, {x:28, y:30}, {x:15, y:-10}, {x:22, y:-40}, {x:8, y:-80}, {x:18, y:-110}], 2, '#4d1e28', 2);
            obCtx.restore(); 

            // 毛孔覆盖
            obCtx.globalCompositeOperation = 'source-atop';
            obCtx.fillStyle = skinPattern; obCtx.fillRect(-BODY_WIDTH / 2, -BODY_HEIGHT / 2, BODY_WIDTH, BODY_HEIGHT);
            obCtx.restore();

            // ----------------------------------------------------
            // 资产 B: 【高光遮罩层】(Specular & Sweat Mask)
            // ----------------------------------------------------
            osCtx.clearRect(0, 0, BODY_WIDTH, BODY_HEIGHT);
            osCtx.save();
            osCtx.translate(BODY_WIDTH / 2, BODY_HEIGHT / 2);

            // 1. 先用纯色填充出严格的主体轮廓
            osCtx.fillStyle = '#000000';
            drawBodyPath(osCtx);
            osCtx.fill();

            // 2. 切换混合模式，确保高光只画在肉体内部
            osCtx.globalCompositeOperation = 'source-in';

            // 清除之前的纯黑填充，只保留裁剪蒙版效果
            osCtx.clearRect(-BODY_WIDTH/2, -BODY_HEIGHT/2, BODY_WIDTH, BODY_HEIGHT);

            // A. 底部双侧组织受尾焰直接炙烤的强烈底光 (Bottom Engine Highlights)
            let specTesticleL = osCtx.createRadialGradient(-35, 140, 0, -35, 120, 40);
            specTesticleL.addColorStop(0, 'rgba(255, 245, 200, 0.9)'); // 核心极亮白黄色
            specTesticleL.addColorStop(0.3, 'rgba(255, 150, 50, 0.5)'); // 引擎橙色焦散
            specTesticleL.addColorStop(1, 'rgba(0, 0, 0, 0)');
            osCtx.fillStyle = specTesticleL;
            osCtx.fillRect(-100, 80, 100, 100);

            let specTesticleR = osCtx.createRadialGradient(35, 140, 0, 35, 120, 40);
            specTesticleR.addColorStop(0, 'rgba(255, 245, 200, 0.9)');
            specTesticleR.addColorStop(0.3, 'rgba(255, 150, 50, 0.5)');
            specTesticleR.addColorStop(1, 'rgba(0, 0, 0, 0)');
            osCtx.fillStyle = specTesticleR;
            osCtx.fillRect(0, 80, 100, 100);

            // B. 主干中轴线的湿润高光 (Wet Shaft Glaze)
            let specShaft = osCtx.createLinearGradient(-40, 0, 40, 0);
            specShaft.addColorStop(0, 'rgba(0,0,0,0)');
            specShaft.addColorStop(0.45, 'rgba(255,255,255,0)');
            specShaft.addColorStop(0.5, 'rgba(255, 255, 255, 0.6)'); // 极细的油润反光线
            specShaft.addColorStop(0.55, 'rgba(255,255,255,0)');
            specShaft.addColorStop(1, 'rgba(0,0,0,0)');
            osCtx.fillStyle = specShaft;
            osCtx.fillRect(-50, -100, 100, 200);

            // C. 冠状体底部反射引擎光芒 (Glans Bottom Rim Light)
            let specGlans = osCtx.createRadialGradient(0, -90, 10, 0, -120, 50);
            specGlans.addColorStop(0, 'rgba(255, 180, 100, 0.7)');
            specGlans.addColorStop(0.5, 'rgba(255, 100, 50, 0.2)');
            specGlans.addColorStop(1, 'rgba(0, 0, 0, 0)');
            osCtx.fillStyle = specGlans;
            osCtx.fillRect(-60, -160, 120, 100);

            osCtx.restore();
        }
        preRenderOrganicAssets();

        // ========================================================
        // 3. 物理学计算与主循环
        // ========================================================
        const entity = {
            x: window.innerWidth / 2, y: window.innerHeight - 180,
            vy: -2.5, angle: 0, baseSpeed: 2.4, gForce: 1.0, bloodPressure: 0,
            noiseOffset: Math.random() * 1000
        };

        let cameraShake = 0;

        function updatePhysics() {
            entity.y += entity.vy;
            entity.x += Math.sin(Date.now() * 0.003 + entity.noiseOffset) * 2.2; 
            entity.angle = Math.sin(Date.now() * 0.006) * 0.04; 

            entity.gForce = 3.5 + Math.sin(Date.now() * 0.001) * 2.5; 
            entity.bloodPressure = (Math.sin(Date.now() * 0.005 * entity.gForce) + 1) / 2;

            const cosA = Math.cos(entity.angle), sinA = Math.sin(entity.angle);
            const engineX1 = entity.x + (-35 * cosA - 120 * sinA), engineY1 = entity.y + (-35 * sinA + 120 * cosA);
            const engineX2 = entity.x + (35 * cosA - 120 * sinA), engineY2 = entity.y + (35 * sinA + 120 * cosA);

            for (let i = 0; i < 3; i++) {
                particles.spawn(engineX1 + (Math.random()-0.5)*12, engineY1, (Math.random()-0.5)*2.5-sinA*5, Math.random()*6+6+cosA*3, 'flame', 28);
                particles.spawn(engineX2 + (Math.random()-0.5)*12, engineY2, (Math.random()-0.5)*2.5-sinA*5, Math.random()*6+6+cosA*3, 'flame', 28);
                if (Math.random() > 0.4) particles.spawn(engineX1 + (Math.random()-0.5)*25, engineY1+15, (Math.random()-0.5)*4, Math.random()*3+3, 'smoke', 55);
            }

            cameraShake = entity.gForce > 5 ? 5.5 + Math.random()*2 : 2.5 + Math.sin(Date.now() * 0.05);
        }

        function drawLoop(timestamp) {
            frames++;
            if (timestamp - lastTime >= 1000) {
                currentFps = frames; frames = 0; lastTime = timestamp;
                document.getElementById('fps').innerText = `FPS: ${currentFps}`;
                document.getElementById('velocity').innerText = `TARGET_SPEED: MACH ${(entity.baseSpeed + entity.gForce*0.1).toFixed(2)}`;
                document.getElementById('gforce').innerText = `DYNAMIC_G: ${entity.gForce.toFixed(2)} G`;
                document.getElementById('bp').style.display = entity.gForce > 5.5 ? 'block' : 'none';
            }

            ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, width, height);
            updatePhysics();

            ctx.save();
            const shakeX = (Math.random() - 0.5) * cameraShake;
            const shakeY = (Math.random() - 0.5) * cameraShake;
            ctx.translate(shakeX, shakeY);

            // 1. 渲染尾部推进粒子
            particles.updateAndDraw(ctx);

            ctx.save();
            ctx.translate(entity.x, entity.y);
            ctx.rotate(entity.angle);
            
            // 2. 绘制包含血管和微观纹理的基础肉体
            ctx.drawImage(offscreenBody, -BODY_WIDTH / 2, -BODY_HEIGHT / 2);

            // 3. 动态充血遮罩
            if (entity.gForce > 2) {
                ctx.globalCompositeOperation = 'color-dodge';
                ctx.globalAlpha = entity.bloodPressure * 0.4 * (entity.gForce / 6); 
                let bpGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, 140);
                bpGrad.addColorStop(0, 'rgba(255, 50, 50, 0.8)'); bpGrad.addColorStop(1, 'rgba(100, 0, 0, 0)');
                ctx.fillStyle = bpGrad;
                ctx.globalCompositeOperation = 'source-atop'; 
                ctx.fillRect(-BODY_WIDTH/2, -BODY_HEIGHT/2, BODY_WIDTH, BODY_HEIGHT);
                ctx.globalCompositeOperation = 'color-dodge';
                ctx.fillRect(-BODY_WIDTH/2, -BODY_HEIGHT/2, BODY_WIDTH, BODY_HEIGHT);
            }

            // 4. 【核心视觉增强】渲染高频闪烁的高光与湿润焦散层
            // 将高光的可见度与真实的随机数(模拟火焰闪烁)绑定
            const flameFlicker = 0.5 + Math.random() * 0.5;
            ctx.globalCompositeOperation = 'screen'; // 采用滤色模式叠加高光
            ctx.globalAlpha = flameFlicker;
            ctx.drawImage(offscreenSpecular, -BODY_WIDTH / 2, -BODY_HEIGHT / 2);

            ctx.restore();
            ctx.restore();

            if (entity.y < -BODY_HEIGHT) entity.y = height + BODY_HEIGHT;
            requestAnimationFrame(drawLoop);
        }

        requestAnimationFrame(drawLoop);
    </script>
</body>
</html>
